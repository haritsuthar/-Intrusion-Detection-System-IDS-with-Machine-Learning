name: Test IDS ML Project

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test imports
      run: |
        python -c "import ids_ml; print('✅ ids_ml imports successfully')"
        python -c "import sys; sys.path.append('backend'); import app; print('✅ backend imports successfully')"
    
    - name: Test ML pipeline (without dataset)
      run: |
        python -c "
        import ids_ml
        import numpy as np
        from sklearn.ensemble import RandomForestClassifier
        
        # Test feature order function
        features = ids_ml.feature_order()
        assert len(features) == 41, 'Should have 41 features'
        print('✅ Feature order test passed')
        
        # Test encoding function
        encoders = {'protocol_type': None, 'service': None, 'flag': None}
        print('✅ ML pipeline structure test passed')
        "